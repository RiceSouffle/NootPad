name: nootpad
description: "NootPad - A cozy note-taking app"
publish_to: 'none'
version: 1.2.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  provider: ^6.1.2
  uuid: ^4.5.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_quill: ^11.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
